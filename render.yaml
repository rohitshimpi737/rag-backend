services:
  - type: web
    name: prabhupada-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ACTIVE_EMBEDDING_PROVIDER
        value: baai
      - key: ACTIVE_LLM_PROVIDER
        value: groq
      - key: RETRIEVAL_K
        value: 20
      - key: RERANK_TOP_N
        value: 5
      - key: RERANKER_MODEL
        value: cross-encoder/ms-marco-MiniLM-L-6-v2
      - key: MAX_TOKENS
        value: 1024
      - key: TEMPERATURE
        value: 0.2
      - key: GROQ_API_KEY
        sync: false
